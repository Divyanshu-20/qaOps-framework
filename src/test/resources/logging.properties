# Config for java.util.logging (JUL) — Selenium's DevTools/CDP code logs
# through JUL directly, bypassing Log4j2/SLF4J entirely.
# Only the known-noisy CDP version-mismatch warning is silenced here;
# everything else keeps the JDK default (INFO) so real problems still show.
org.openqa.selenium.devtools.CdpVersionFinder.level = SEVERE
